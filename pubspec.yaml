name: MIR
description: Realise_beta №3/MMBD03
publish_to: 'none'
version: 26.4.16+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^3.1.4
  provider: ^6.1.1
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0
  image_picker: ^1.0.7
  file_picker: ^11.0.2
  http: ^1.2.0
  photo_view: ^0.15.0          # для просмотра изображений с зумом
  video_player: ^2.9.2         # для воспроизведения видео
  dio: ^5.7.0                  # для скачивания файлов
  path_provider: ^2.1.5        # для получения путей к директориям
  permission_handler: ^11.4.0
  device_info_plus: ^9.1.2
  open_file:
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true # Это убирает альфа-канал для iOS
